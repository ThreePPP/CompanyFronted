<div class="min-h-screen bg-gray-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10 w-full max-w-sm">
    <h2 class="text-lg font-semibold text-gray-800 mb-8 text-center tracking-wide">เข้าสู่ระบบ</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-5">
        <label class="block text-sm text-gray-500 mb-1.5">ชื่อบัญชีผู้ใช้งาน</label>
        <input
          formControlName="username"
          type="text"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm text-gray-800 outline-none focus:border-gray-400 transition-colors bg-gray-50 focus:bg-white"
          placeholder="username"
        />
      </div>

      <div class="mb-7">
        <label class="block text-sm text-gray-500 mb-1.5">รหัสผ่าน</label>
        <input
          formControlName="password"
          type="password"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm text-gray-800 outline-none focus:border-gray-400 transition-colors bg-gray-50 focus:bg-white"
          placeholder="••••••••"
        />
      </div>

      <div *ngIf="errorMessage" class="mb-4 text-xs text-red-400 text-center">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="isLoading || loginForm.invalid"
        class="w-full bg-gray-800 text-white text-sm font-medium py-2.5 rounded-lg hover:bg-gray-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        {{ isLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
    </form>
  </div>
</div>
