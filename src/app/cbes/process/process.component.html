<div>

  <!-- Page Header -->
  <div class="mb-6">
    <h1 class="text-base font-semibold text-gray-800">จัดการหลักเกณฑ์ CBEs</h1>
  </div>

  <!-- Search & Actions Bar -->
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm px-5 py-4 mb-5 flex items-center gap-3 flex-wrap">
    <!-- Search -->
    <label class="text-sm text-gray-500 flex-shrink-0">หัวข้อ :</label>
    <input
      [(ngModel)]="searchText"
      (ngModelChange)="onSearchChange($event)"
      type="text"
      placeholder="ค้นหา..."
      class="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 outline-none focus:border-gray-400 bg-gray-50 focus:bg-white transition-colors w-64"
    />
    <button (click)="onSearch()" class="px-4 py-2 bg-gray-800 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
      ค้นหา
    </button>

    <div class="flex-1"></div>

    <!-- Action Buttons -->
    <a routerLink="/cbes/process/trash"
      class="flex items-center gap-1.5 px-4 py-2 border border-gray-200 text-sm text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      กล่องขยะ
    </a>
    <a routerLink="/cbes/process/add"
      class="flex items-center gap-1.5 px-4 py-2 bg-gray-800 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
      </svg>
      เพิ่ม
    </a>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left font-medium text-gray-500 px-5 py-3.5 w-8">#</th>
          <th class="text-left font-medium text-gray-500 px-5 py-3.5">หัวข้อ</th>
          <th class="text-center font-medium text-gray-500 px-5 py-3.5 w-28">สถานะ</th>
          <th class="text-center font-medium text-gray-500 px-5 py-3.5 w-80">จัดการ</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredList; let i = index"
          class="border-b border-gray-50 hover:bg-gray-50/60 transition-colors">
          <td class="px-5 py-3.5 text-gray-400">{{ i + 1 }}</td>
          <td class="px-5 py-3.5 text-gray-700 leading-snug">{{ formatTopic(item) }}</td>
          <td class="px-5 py-3.5 text-center">
            <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-50 text-green-700 border border-green-100">
              {{ item.status }}
            </span>
          </td>
          <td class="px-5 py-3.5">
            <div class="flex items-center justify-center gap-1.5 flex-wrap">
              <!-- Edit -->
              <a [routerLink]="['/cbes/process/edit', item.id]"
                class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors whitespace-nowrap">
                แก้ไข
              </a>
              <!-- Responsible -->
              <button
                class="px-3 py-1.5 text-xs border border-blue-100 text-blue-600 rounded-lg hover:bg-blue-50 transition-colors whitespace-nowrap">
                ผู้รับผิดชอบ
              </button>
              <!-- Trash -->
              <button (click)="trashItem(item.id)"
                class="px-3 py-1.5 text-xs border border-red-100 text-red-500 rounded-lg hover:bg-red-50 transition-colors whitespace-nowrap">
                ลบ
              </button>
            </div>
          </td>
        </tr>

        <!-- Empty state -->
        <tr *ngIf="filteredList.length === 0">
          <td colspan="4" class="px-5 py-10 text-center text-sm text-gray-400">ไม่พบข้อมูล</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
