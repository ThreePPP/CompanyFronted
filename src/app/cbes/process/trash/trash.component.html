<div>

  <!-- Page Header -->
  <div class="mb-6">
    <h1 class="text-base font-semibold text-gray-800">กล่องขยะจัดการหลักเกณฑ์ CBEs</h1>
  </div>

  <!-- Search & Actions Bar -->
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm px-5 py-4 mb-5 flex items-center gap-3 flex-wrap">
    <label class="text-sm text-gray-500 flex-shrink-0">หัวข้อ :</label>
    <input
      [(ngModel)]="searchText"
      (ngModelChange)="onSearchChange($event)"
      type="text"
      placeholder="ค้นหา..."
      class="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 outline-none focus:border-gray-400 bg-gray-50 focus:bg-white transition-colors w-64"
    />
    <button (click)="onSearch()" class="px-4 py-2 bg-gray-800 text-white text-sm rounded-lg hover:bg-gray-700 transition-colors">
      ค้นหา
    </button>

    <div class="flex-1"></div>

    <a routerLink="/cbes/process"
      class="flex items-center gap-1.5 px-4 py-2 border border-gray-200 text-sm text-gray-600 rounded-lg hover:bg-gray-50 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
      กลับ
    </a>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-50 border-b border-gray-100">
          <th class="text-left font-medium text-gray-500 px-5 py-3.5 w-8">#</th>
          <th class="text-left font-medium text-gray-500 px-5 py-3.5 w-36">วันที่ปรับปรุง</th>
          <th class="text-left font-medium text-gray-500 px-5 py-3.5">หัวข้อ</th>
          <th class="text-center font-medium text-gray-500 px-5 py-3.5 w-44">จัดการ</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredList; let i = index"
          class="border-b border-gray-50 hover:bg-gray-50/60 transition-colors">
          <td class="px-5 py-3.5 text-gray-400">{{ i + 1 }}</td>
          <td class="px-5 py-3.5 text-gray-500">{{ formatDate(item.updateDate) }}</td>
          <td class="px-5 py-3.5 text-gray-700 leading-snug">{{ formatTopic(item) }}</td>
          <td class="px-5 py-3.5">
            <div class="flex items-center justify-center gap-1.5">
              <button (click)="restoreItem(item.id)"
                class="px-3 py-1.5 text-xs border border-gray-200 text-gray-600 rounded-lg hover:bg-gray-50 transition-colors whitespace-nowrap">
                ยกเลิก
              </button>
              <button (click)="deleteItem(item.id)"
                class="px-3 py-1.5 text-xs border border-red-100 text-red-500 rounded-lg hover:bg-red-50 transition-colors whitespace-nowrap">
                ลบ
              </button>
            </div>
          </td>
        </tr>

        <!-- Empty state -->
        <tr *ngIf="filteredList.length === 0">
          <td colspan="4" class="px-5 py-10 text-center text-sm text-gray-400">ไม่พบข้อมูลในกล่องขยะ</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
